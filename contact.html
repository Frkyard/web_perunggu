<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="PERUNGGU — Hubungi kami untuk kolaborasi, booking, atau sekedar menyapa. Kirim pesan langsung ke band PERUNGGU.">
    <meta name="theme-color" content="#0a0a0f">
    <title>PERUNGGU — Contact</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>

<!-- HEADER -->
<header id="main-header">
    <div class="logo">
        <img src="images/logo.jpeg" alt="Logo Perunggu">
        <span>PERUNGGU</span>
    </div>
    <button class="menu-toggle" id="menu-toggle" aria-label="Toggle menu">
        <span></span><span></span><span></span>
    </button>
    <nav id="main-nav">
        <ul>
            <li><a href="index.html">Home</a></li>
            <li><a href="about.html">About</a></li>
            <li><a href="music.html">Music</a></li>
            <li><a href="updates.html">Updates</a></li>
            <li><a href="shop.html">Shop</a></li>
            <li><a href="contact.html" class="active">Contact</a></li>
        </ul>
    </nav>
</header>

<!-- CONTACT CONTENT -->
<div class="contact-layout">

    <!-- KIRIM PESAN (Form) -->
    <div class="contact-form" id="contact-form">
        <h2 class="section-title">Kirim Pesan</h2>

        <form id="form-contact" onsubmit="return handleSubmit(event)">
            <div class="form-group">
                <label for="input-nama">Nama</label>
                <input type="text" id="input-nama" name="nama" placeholder="Nama lengkap kamu" required>
            </div>

            <div class="form-group">
                <label for="input-email">Email</label>
                <input type="email" id="input-email" name="email" placeholder="email@contoh.com" required>
            </div>

            <div class="form-group">
                <label for="input-subject">Subject</label>
                <input type="text" id="input-subject" name="subject" placeholder="Tentang apa?">
            </div>

            <div class="form-group">
                <label for="input-pesan">Pesan</label>
                <textarea id="input-pesan" name="pesan" placeholder="Tulis pesan kamu di sini..." required></textarea>
            </div>

            <button type="submit" class="btn-submit" id="btn-kirim-pesan">KIRIM PESAN</button>
        </form>
    </div>

    <!-- INFO KONTAK + MAPS -->
    <div class="contact-right">
        <h2 class="section-title">Info Kontak</h2>

        <div class="info-list">
            <div class="info-item" id="info-email">
                <i class="fas fa-envelope"></i>
                <span>info@perunggu.com</span>
            </div>
            <div class="info-item" id="info-telp">
                <i class="fas fa-phone"></i>
                <span>+62 812 3456 7890</span>
            </div>
            <div class="info-item" id="info-location">
                <i class="fas fa-location-dot"></i>
                <span>Jakarta, Indonesia</span>
            </div>
        </div>

        <!-- IKUTI KAMI -->
        <div class="follow-us">
            <h3>Ikuti Kami</h3>
            <div class="social-links-contact">
                <a href="https://instagram.com" target="_blank" aria-label="Instagram" id="contact-instagram">
                    <i class="fa-brands fa-instagram"></i>
                </a>
                <a href="https://youtube.com" target="_blank" aria-label="YouTube" id="contact-youtube">
                    <i class="fa-brands fa-youtube"></i>
                </a>
                <a href="https://spotify.com" target="_blank" aria-label="Spotify" id="contact-spotify">
                    <i class="fa-brands fa-spotify"></i>
                </a>
                <a href="https://tiktok.com" target="_blank" aria-label="TikTok" id="contact-tiktok">
                    <i class="fa-brands fa-tiktok"></i>
                </a>
            </div>
        </div>

        <!-- MAPS -->
        <div class="map-section">
            <h3>Maps</h3>
            <div class="map-placeholder" id="map-placeholder">
                <i class="fas fa-location-dot"></i>
            </div>
        </div>
    </div>

</div>

<!-- FOOTER -->
<footer id="main-footer">
    <div class="footer-left">
        <img src="images/logo.jpeg" alt="Perunggu Logo">
        <div class="social">
            <a href="https://instagram.com" target="_blank" aria-label="Instagram" id="social-instagram">
                <i class="fa-brands fa-instagram"></i>
            </a>
            <a href="https://youtube.com" target="_blank" aria-label="YouTube" id="social-youtube">
                <i class="fa-brands fa-youtube"></i>
            </a>
            <a href="https://spotify.com" target="_blank" aria-label="Spotify" id="social-spotify">
                <i class="fa-brands fa-spotify"></i>
            </a>
            <a href="https://tiktok.com" target="_blank" aria-label="TikTok" id="social-tiktok">
                <i class="fa-brands fa-tiktok"></i>
            </a>
        </div>
    </div>
    <p>&copy; Copyright 2026 PERUNGGU</p>
</footer>

<script>
    // Hamburger menu toggle
    const menuToggle = document.getElementById('menu-toggle');
    const mainNav = document.getElementById('main-nav');

    menuToggle.addEventListener('click', () => {
        menuToggle.classList.toggle('active');
        mainNav.classList.toggle('open');
    });

    mainNav.querySelectorAll('a').forEach(link => {
        link.addEventListener('click', () => {
            menuToggle.classList.remove('active');
            mainNav.classList.remove('open');
        });
    });

    // Form submission
    function handleSubmit(e) {
        e.preventDefault();
        const nama = document.getElementById('input-nama').value;
        const btn = document.getElementById('btn-kirim-pesan');

        btn.textContent = 'TERKIRIM!';
        btn.style.background = 'linear-gradient(135deg, #2ecc71, #27ae60)';

        setTimeout(() => {
            btn.textContent = 'KIRIM PESAN';
            btn.style.background = '';
            e.target.reset();
        }, 2000);

        return false;
    }
</script>

</body>
</html>
